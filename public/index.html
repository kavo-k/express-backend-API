<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>

<body>
  <header>
    <div class="header-bottom">
      <div class="brand-row">
        <div class="brand-copy">
          <h1>Market Products</h1>
        </div>
        <a class="top-link" href="test.html">Race mini-game</a>
        <a class="cart-link" href="/cart.html" aria-label="Cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39A2 2 0 0 0 9.64 16H19a2 2 0 0 0 1.95-1.57L23 6H6"></path>
          </svg>
          <span>Cart</span>
        </a>
        <div class="userMenu">
          <a href="/profile.html" id="profileBtn" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profile
          </a>
          <p id="TokenIsAvailable"></p>
        </div>
      </div>

      <form action="" id="searchForm" class="search-input">
        <input id="inputSearch" class="search-input" type="text" placeholder="Search products by name...">
      </form>
    </div>
  </header>

  <main>

    <section class="home-toolbar row">
      <div class="toolbar-left">
        <select name="sort" id="sortSelect">
          <option value="desc">Newest First</option>
          <option value="asc">Oldest First</option>
        </select>
      </div>

      <div class="toolbar-right pagination">
        <button id="btnPrev" type="button">Prev</button>
        <span id="pageInfo">1</span>
        <button id="btnNext" type="button">Next</button>
      </div>
    </section>

    <section id="productsConteiner"></section>
  </main>

  <div id="modalImage" class="modal-overlay" aria-hidden="true"></div>

  <script src="/shared/auth.js"></script>
  <script src="/catalog/products.js"></script>
</body>

</html>
