<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="/shared/styles.css" />
  <script src="/shared/header.js"></script>
  <script src="/shared/auth.js"></script>
</head>

<body class="profile_body profile-page-body">
  <header id="siteHeader"></header>
  <script>
    renderSharedHeader(document.getElementById("siteHeader"), {
      searchPlaceholder: "Поиск по моим товарам...",
      showSearch: true,
      showBack: true,
      backHref: "/",
      showFavorites: false,
      showCart: true,
      showProfile: false,
      cartCount: "0"
    });
  </script>

  <main class="profile-page-shell">
  <div class="profile-container">
    <section class="profile-hero">
      <div class="profile-top">
        <p class="home-hero-badge">Личный кабинет</p>
        <h1>Профиль</h1>
        <p class="profile-top-note">Управляй аккаунтом, публикуй объявления и следи за своими товарами.</p>
      </div>

      <div class="profile-bottom">
        <button id="addProductBtn" type="button">Добавить товар</button>
        <button id="logoutBtn" type="button">Выйти</button>
        <button id="backBtn" type="button">Назад</button>
      </div>
    </section>

    <section class="profile-main">
      <div class="profile-facts">
        <p><strong>Имя</strong><span id="name">Loading...</span></p>
        <p><strong>Email</strong><span id="email">Loading...</span></p>
        <p><strong>Возраст</strong><span id="age">Loading...</span></p>
      </div>

      <div class="profile-details-card">
        <p><strong>Детали аккаунта</strong></p>
        <div id="details"></div>
      </div>
    </section>

    <section class="profile-products-toolbar row">
      <div class="toolbar-left">
        <select name="sort" id="sortSelect">
          <option value="desc">Сначала новые</option>
          <option value="asc">Сначала старые</option>
        </select>
      </div>

      <div class="toolbar-right pagination">
        <button id="btnPrev" type="button">Назад</button>
        <span id="pageInfo">1</span>
        <button id="btnNext" type="button">Далее</button>
      </div>
    </section>

    <section class="profile-products">
      <div class="profile-products-head">
        <h2>Мои объявления</h2>
        <p>Твои карточки товаров и быстрый доступ к редактированию.</p>
      </div>

      <div id="myProductsList" class="profile-products-grid">
        <p class="profile-products-empty">Loading...</p>
      </div>
    </section>
  </div>
  </main>

  <script src="/profile/profile.js"></script>
</body>

</html>
