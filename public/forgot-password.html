<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>

<body class="forgot_body">
  <div class="forgot-container">
    <p class="home-hero-kicker">Recovery</p>
    <h1>Forgot Password</h1>
    <p class="forgot-note">Enter the email tied to your account. The next step will send a reset link.</p>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" name="email" required placeholder="you@example.com">
      </div>

      <button type="submit" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="error-container">
      <p id="errorMessage" class="error-message"></p>
      <p id="successMessage" class="success-message"></p>
    </div>

    <div class="separator">
      <p>Remembered your password? <a href="./login.html">Back to sign in</a></p>
      <p>Need a new account? <a href="./register.html">Create account</a></p>
    </div>
  </div>

  <script src="/shared/auth.js"></script>
  <script src="/forgot-password/forgot-password.js"></script>
</body>

</html>
