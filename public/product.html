<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <script src="/shared/header.js"></script>
</head>

<body class="product-page-body">
    <header id="siteHeader"></header>
    <main>
        <a class="product-back-link" href="/">Назад в каталог</a>

        <div class="error-container">
            <p id="errorMessage" class="error-message"></p>
        </div>

        <section id="productPageCard">
            <div class="product-page-media">
                <div class="product-page-image-frame">
                    <img id="productPageImage" class="product-image" hidden alt="Product image">
                </div>
                <div class="product-gallery-strip" aria-label="Product gallery"></div>
            </div>

            <div class="product-page-content">
                <p class="product-page-badge">Актуальный лот</p>
                <h3 id="productName"></h3>
                <div class="product-rating-row">
                    <span class="product-rating-stars">★★★★☆</span>
                    <span class="product-rating-score">4.6</span>
                    <span class="product-rating-count">(89 отзывов)</span>
                </div>
                <p id="productPrice"></p>
                <p id="productType"></p>
                <p id="productDescription"></p>
                <p id="productOwner"></p>
                <p id="productCreatedAt"></p>
                <div class="product-page-actions" id="productPageActions">
                    <div class="product-purchase-panel">
                        <button id="addToCartBtn" class="cart-action-btn product-add-btn" type="button">В корзину</button>
                        <div id="productQuantityControls" class="product-quantity-card" hidden>
                            <button id="productMinusBtn" class="product-qty-btn" type="button" aria-label="Decrease quantity">-</button>
                            <span id="productCartQuantity" class="product-qty-value"></span>
                            <button id="productPlusBtn" class="product-qty-btn" type="button" aria-label="Increase quantity">+</button>
                        </div>
                    </div>
                </div>
                <a id="editProduct" href="" hidden="true"></a>

                <div class="product-benefits">
                    <article class="product-benefit-card">
                        <h4>Продавец</h4>
                        <p>Все детали и описание указаны в карточке товара</p>
                    </article>
                    <article class="product-benefit-card">
                        <h4>Покупка</h4>
                        <p>Добавь в корзину и перейди к оформлению в пару шагов</p>
                    </article>
                    <article class="product-benefit-card">
                        <h4>Карточка</h4>
                        <p>Цена, описание и категория собраны в одном месте</p>
                    </article>
                </div>
            </div>
        </section>

        <section class="product-reviews-section" aria-labelledby="productReviewsTitle">
            <div class="product-reviews-header">
                <div>
                    <p class="product-reviews-eyebrow">Отзывы</p>
                    <h3 id="productReviewsTitle">Мнения покупателей</h3>
                </div>
                <div class="product-reviews-summary">
                    <span class="product-reviews-score"></span>
                    <span class="product-reviews-stars">★★★★★</span>
                    <span class="product-reviews-count">Загрузка</span>
                </div>
            </div>

            <form class="product-review-form">
                <label for="reviewRating">Оценка</label>
                <select id="reviewRating" name="rating">
                    <option value="">Выбрать</option>
                    <option value="5">★★★★★</option>
                    <option value="4">★★★★☆</option>
                    <option value="3">★★★☆☆</option>
                    <option value="2">★★☆☆☆</option>
                    <option value="1">★☆☆☆☆</option>
                </select>
                <textarea id="reviewText" name="text" rows="1" placeholder="Что стоит знать о товаре?"></textarea>

                <button type="button" class="product-review-submit">Оставить отзыв</button>
            </form>

            <div class="product-reviews-list">
                <!-- <article class="product-review-card">
                    <div class="product-review-card-top">
                        <strong>Покупатель</strong>
                        <span>★★★★★</span>
                    </div>
                    <p>Товар соответствует описанию, упаковка аккуратная. Покупкой доволен.</p>
                </article>

                <article class="product-review-card">
                    <div class="product-review-card-top">
                        <strong>Алексей</strong>
                        <span>★★★★☆</span>
                    </div>
                    <p>Все нормально, но хотелось бы больше фотографий в карточке.</p>
                </article> -->
            </div>
        </section>
    </main>

    <div id="modalImage" class="modal-overlay" aria-hidden="true">
        <img id="productPageFullImage" class="product-image" hidden alt="Product image">
    </div>

    <script src="/shared/auth.js"></script>
    <script src="/product/product.js"></script>
</body>

</html>
