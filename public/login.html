<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>

<body class="login_body">
  <div class="login-container">
    <p class="home-hero-kicker">Login</p>
    <h2>Sign In</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" name="email" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" name="password" required placeholder="Your password">
      </div>

      <button type="submit" id="submitBtn">Sign In</button>
    </form>

    <div class="error-container">
      <p id="errorMessage" class="error-message"></p>
    </div>

    <div class="separator">
      <p>Don't have an account? <a href="./register.html">Create account</a></p>
      <p>Forgot password? <a href="./forgot-password.html">Reset</a></p>
    </div>
  </div>

  <script src="/shared/auth.js"></script>
  <script src="/login/login.js"></script>
</body>

</html>
