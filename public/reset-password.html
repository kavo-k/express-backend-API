<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>

<body class="reset_body">
  <div class="reset-container">
    <p class="home-hero-kicker">Recovery</p>
    <h1>Reset Password</h1>
    <p class="reset-note">Enter a new password for your account. This page expects a reset token in the link.</p>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label for="newPasswordInput">New Password</label>
        <input type="password" id="newPasswordInput" name="newPassword" required placeholder="Enter new password">
      </div>

      <div class="form-group">
        <label for="confirmPasswordInput">Confirm Password</label>
        <input type="password" id="confirmPasswordInput" name="confirmPassword" required placeholder="Repeat new password">
      </div>

      <button type="submit" id="resetSubmitBtn" class="submit-btn">Update Password</button>
    </form>

    <div class="error-container">
      <p id="errorMessage" class="error-message"></p>
      <p id="successMessage" class="success-message"></p>
    </div>

    <div class="separator">
      <p>Remembered your password? <a href="./login.html">Back to sign in</a></p>
      <p>Need a reset link first? <a href="./forgot-password.html">Request a reset email</a></p>
    </div>
  </div>
  <script src="/reset-password/reset-password.js"></script>
</body>

</html>
