<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>

<body class="register_body">
  <div class="register-container">
    <p class="home-hero-kicker">Register</p>
    <h1>Create Account</h1>
    <form id="registerForm">
      <div class="form-group">
        <label for="userNameInput">Username</label>
        <input type="text" id="userNameInput" name="userName" required placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" name="email" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="ageInput">Age</label>
        <input type="number" id="ageInput" name="age" required placeholder="18">
      </div>

      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" name="password" required>
      </div>

      <div class="form-group">
        <label for="confirmPasswordInput">Confirm Password</label>
        <input type="password" id="confirmPasswordInput" name="confirm-password" required>
      </div>

      <button id="submitBtn" type="submit">Register</button>
    </form>

    <div class="error-container">
      <p id="errorMessage" class="error-message"></p>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="/shared/auth.js"></script>
  <script src="/register/register.js"></script>
</body>

</html>
