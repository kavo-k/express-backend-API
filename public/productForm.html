<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product</title>
  <link rel="stylesheet" href="/shared/styles.css" />
  <script src="/shared/auth.js"></script>
</head>

<body class="addProduct_body">
  <div class="product-form-shell">
    <form id="productForm">
      <h2 id="creatorName"></h2>

      <label for="productName">Product Name<span class="zv">*</span></label>
      <input type="text" id="productName" name="name" required>

      <label for="productImage">Product Image<span class="zv">*</span></label>
      <input type="file" id="productImage" name="images">

      <img class="product-image" id="productImagePut" hidden="true">

      <label for="price">Price<span class="zv">*</span></label>
      <input type="number" id="price" name="price" step="0.01" required>

      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4"></textarea>

      <div class="product-form-section">
        <label for="category">Category<span class="zv">*</span></label>
        <select id="category" name="type" required>
          <option value="">Выбрать категорию</option>
          <option value="электроника">Электроника</option>
          <option value="одежда">Одежда</option>
          <option value="книги">Книги</option>
          <option value="для дома">Для дома</option>
          <option value="спорт">Спорт</option>
          <option value="аксессуары">Аксессуары</option>
          <option value="красота и уход">Красота и уход</option>
          <option value="детские товары">Детские товары</option>
          <option value="товары для животных">Товары для животных</option>
          <option value="игры и консоли">Игры и консоли</option>
          <option value="автотовары">Автотовары</option>
          <option value="другое">Другое</option>
          <option value="customCategory">Своя категория</option>
        </select>
        <p class="product-form-hint">Если нужной категории нет в списке, выбери пункт «Своя категория».</p>
      </div>

      <div id="otherCategoryContainer" class="product-form-section" aria-hidden="true" hidden="true">
        <label for="customCategory">Custom Category<span class="zv">*</span></label>
        <input type="text" id="customCategory" name="otherCategory" placeholder="Например: винил, коллекции, ручная работа">
      </div>

      <div class="error-container">
        <p id="errorMessage" class="error-message"></p>
      </div>

      <div class="product-buttons">
        <button id="submitBtn" type="submit" class="submit-btn">Save</button>
        <button type="reset">Clear</button>
        <button id="deleteBtn" type="button" class="delete-btn">Delete</button>
        <button id="backBtn" type="button">Back</button>
      </div>
    </form>
  </div>

  <div id="deleteModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h3 id="deleteModalTitle">Delete product?</h3>
      <p id="deleteModalText">This action cannot be undone. Are you sure?</p>
      <div class="modal-actions">
        <button id="cancelDeleteBtn" type="button">Cancel</button>
        <button id="confirmDeleteBtn" type="button" class="delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <div id="modalImage" class="modal-overlay" aria-hidden="true"></div>

  <script src="/product/productForm.js"></script>
</body>

</html>
